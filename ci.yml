name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust Core ──────────────────────────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust_core/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        working-directory: rust_core
        run: cargo fmt --check

      - name: Clippy
        working-directory: rust_core
        run: cargo clippy -- -D warnings

      - name: Unit + Integration tests
        working-directory: rust_core
        run: cargo test --verbose

      - name: Install cargo-audit and cargo-deny
        working-directory: rust_core
        run: cargo install cargo-audit cargo-deny

      - name: cargo audit
        working-directory: rust_core
        run: cargo audit

      - name: cargo deny advisories
        working-directory: rust_core
        run: cargo deny check advisories

  # ── Rust cross-compile for Android ────────────────────────────────────────
  rust-android:
    name: Rust → Android targets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_core/target
          key: android-cargo-${{ hashFiles('rust_core/Cargo.lock') }}

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build arm64-v8a (release)
        working-directory: rust_core
        run: cargo ndk -t arm64-v8a build --release

      - name: Build x86_64 (release)
        working-directory: rust_core
        run: cargo ndk -t x86_64 build --release

  # ── Rust cross-compile for iOS ─────────────────────────────────────────────
  rust-ios:
    name: Rust → iOS targets
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_core/target
          key: ios-cargo-${{ hashFiles('rust_core/Cargo.lock') }}

      - name: Install cargo-lipo
        run: cargo install cargo-lipo

      - name: Build universal iOS library
        working-directory: rust_core
        run: cargo lipo --release

      - name: Upload libaether_core.a
        uses: actions/upload-artifact@v4
        with:
          name: libaether_core-ios
          path: rust_core/target/universal/release/libaether_core.a

  # ── Android JVM unit tests ────────────────────────────────────────────────
  android-unit-test:
    name: Android JVM unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        working-directory: android
        run: chmod +x gradlew

      - name: Run host-side Android unit tests
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest

  # ── Android instrumented tests (ADR-002) ──────────────────────────────────
  android-instrumented-test:
    name: Android instrumented tests
    runs-on: macos-latest  # macOS required for hardware-accelerated emulator

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        working-directory: android
        run: chmod +x gradlew

      # ADR-002: Enable KVM for hardware-accelerated emulator on macOS runners
      - name: Enable KVM group permissions
        run: |
          echo "KERNEL==\"kvm\", GROUP=\"kvm\", MODE=\"0666\", OPTIONS=\"static_node=kvm\"" | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android instrumented tests
        working-directory: android
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: Nexus 6
          heap-size: 512M
          ram-size: 4096M
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest

  # ── iOS XCTest (ADR-002) ──────────────────────────────────────────────────
  ios-xctest:
    name: iOS XCTest
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_core/target
          key: ios-test-cargo-${{ hashFiles('rust_core/Cargo.lock') }}

      - name: Build Rust iOS library
        working-directory: rust_core
        run: cargo build --target aarch64-apple-ios-sim --release

      - name: Run iOS XCTests
        working-directory: ios/AetherApp
        run: |
          xcodebuild test \
            -scheme AetherApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO | xcpretty

  # ── Python forge tool ──────────────────────────────────────────────────────
  python:
    name: Python forge tool
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('tools/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r tools/requirements.txt pytest

      - name: Run forge tests (28 tests)
        working-directory: tools
        run: pytest forge_test.py -v

  # ── Summary gate ───────────────────────────────────────────────────────────
  ci-pass:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [rust, rust-android, rust-ios, android-unit-test, android-instrumented-test, ios-xctest, python]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.rust.result }}"                    != "success" ||
                "${{ needs.rust-android.result }}"          != "success" ||
                "${{ needs.rust-ios.result }}"              != "success" ||
                "${{ needs.android-unit-test.result }}"     != "success" ||
                "${{ needs.android-instrumented-test.result }}" != "success" ||
                "${{ needs.ios-xctest.result }}"            != "success" ||
                "${{ needs.python.result }}"                != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed ✓"
